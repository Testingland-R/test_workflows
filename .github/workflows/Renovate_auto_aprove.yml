name: Renovate auto approve call

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [dismissed]


jobs:
  Aprover_call:
    uses: Testingland-R/workflows/.github/workflows/auto-approve-renovate.yml@a1e58a8fa83301104e9b090afce1f36672e1bb40 # main
    permissions:
      pull-requests: write
      contents: read
