name: Renovate auto approve call

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [dismissed]


jobs:
  Aprover_call:
    uses: Testingland-R/workflows/.github/workflows/auto-approve-renovate.yml@6cd4d8b7c3dfc3023d6173c4ff0f5d9507e66a37 # main
    permissions:
