name: CI
on:
  - push
  - workflow_dispatch

jobs:
  python-tests:
    uses: Testingland-R/workflows/.github/workflows/pytest-scan.yml@main
    with:
      python-version: '3.11'
      test-command: 'pytest --maxfail=1 --cov -v'

  sonarqube-scan:
    needs: python-tests
    uses: Testingland-R/workflows/.github/workflows/sonarqube-scan.yml@main
    secrets:
      sonar-token: ${{ secrets.SONAR_TOKEN }}
    with:
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
