name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  python-tests:
    uses: Testingland-R/workflows/.github/workflows/pytest-scan.yml@626cc04b74f5bfaf75359aae8616a325908a3e90 # main
    with:
      python-version: '3.11'
      test-command: 'pytest --maxfail=1 --cov=. --cov-report=xml -v'

  sonarqube-scan:
    needs: python-tests
    uses: Testingland-R/workflows/.github/workflows/sonarqube-scan.yml@626cc04b74f5bfaf75359aae8616a325908a3e90 # main
    secrets:
      sonar-token: ${{ secrets.SONAR_TOKEN }}
    with:
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
