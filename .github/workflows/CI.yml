name: CI
on:
  - push
  - workflow_dispatch

jobs:
  call-reusable-workflow:
    uses: Testingland-R/workflows/.github/workflows/python_CI.yml@2f76782539aec2160b0fef744c8392a77970b68b # main
    secrets:
      sonar-token: ${{ secrets.SONAR_TOKEN }}
    with:
      python-version: '3.11'
      test-command: 'pytest --maxfail=1 --cov -v'
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
