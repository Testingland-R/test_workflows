name: CI
on:
  workflow_dispatch:

jobs:
  call-reusable-workflow:
    uses: roquevaamonde/workflows/.github/workflows/python_CI.yml@${{ vars.PYTHON_WF_CI_SHA}}
    with:
      python-version: '3.11'
      test-command: 'pytest --maxfail=1 --cov -v'
    secrets:
      repo_token: ${{ secrets.REUSABLE_WORKFLOW_TOKEN }}
