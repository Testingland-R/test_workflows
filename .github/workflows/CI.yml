name: CI
on:
  - push
  - workflow_dispatch

jobs:
  call-reusable-workflow:
    uses: Testingland-R/workflows/.github/workflows/python_CI.yml@a1e58a8fa83301104e9b090afce1f36672e1bb40 # main
    secrets:
      sonar-token: ${{ secrets.SONAR_TOKEN }}
    with:
      python-version: '3.11'
      test-command: 'pytest --maxfail=1 --cov -v'
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
